<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Trust Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div class="glass-container header">
        <h1>Evolution of Trust <span>Network Engine MVP</span></h1>
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Generation Tick</span>
                <span class="stat-value" id="tick-counter">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Nodes</span>
                <span class="stat-value" id="node-counter">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Edges</span>
                <span class="stat-value" id="edge-counter">0</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="glass-container canvas-wrapper">
            <div id="graph-container"></div>
        </div>

        <div class="glass-container controls-panel">
            <h2>Simulation Controls</h2>
            
            <div class="control-group">
                <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                    <button class="btn btn-primary" id="btn-play" style="flex: 1;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        Play
                    </button>
                    <button class="btn btn-secondary" id="btn-pause" style="flex: 1; display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                        Pause
                    </button>
                </div>
                <button class="btn btn-secondary" id="btn-tick">
                    Advance 1 Step
                </button>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                    <label for="speed-slider" style="font-size: 0.8rem;">Speed:</label>
                    <input type="range" id="speed-slider" min="1" max="10" value="3" style="flex: 1; margin-left: 0.5rem;">
                </div>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label for="topology-select">Graph Topology</label>
                <select id="topology-select" class="glass-input">
                    <option value="ring">Ring Network</option>
                    <option value="complete">Fully Connected</option>
                </select>
            </div>

            <div class="control-group">
                <label for="size-input">Population Size</label>
                <input type="number" id="size-input" class="glass-input" value="12" min="3" max="50">
            </div>

            <div class="control-group">
                <label>Strategy Distribution (%)</label>
                <div id="distribution-sliders" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <div class="dist-row">
                        <span class="color-swatch coop" style="display: inline-block;"></span>
                        <input type="range" id="dist-coop" min="0" max="100" value="33" style="flex: 1;">
                        <span id="val-coop" style="width: 30px; text-align: right; font-size: 0.8rem;">33</span>
                    </div>
                    <div class="dist-row">
                        <span class="color-swatch cheat" style="display: inline-block;"></span>
                        <input type="range" id="dist-cheat" min="0" max="100" value="33" style="flex: 1;">
                        <span id="val-cheat" style="width: 30px; text-align: right; font-size: 0.8rem;">33</span>
                    </div>
                    <div class="dist-row">
                        <span class="color-swatch copycat" style="display: inline-block;"></span>
                        <input type="range" id="dist-copycat" min="0" max="100" value="34" style="flex: 1;">
                        <span id="val-copycat" style="width: 30px; text-align: right; font-size: 0.8rem;">34</span>
                    </div>
                    <div class="dist-row">
                        <span class="color-swatch grudger" style="display: inline-block;"></span>
                        <input type="range" id="dist-grudger" min="0" max="100" value="0" style="flex: 1;">
                        <span id="val-grudger" style="width: 30px; text-align: right; font-size: 0.8rem;">0</span>
                    </div>
                    <div class="dist-row">
                        <span class="color-swatch detective" style="display: inline-block;"></span>
                        <input type="range" id="dist-detective" min="0" max="100" value="0" style="flex: 1;">
                        <span id="val-detective" style="width: 30px; text-align: right; font-size: 0.8rem;">0</span>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <button class="btn btn-secondary" id="btn-reset">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
                    Reset & Generate
                </button>
            </div>
            
            <div class="divider"></div>

            <div class="legend">
                <h3>Strategies</h3>
                <div class="legend-item">
                    <div class="color-swatch coop"></div>
                    <span>Always Cooperate</span>
                </div>
                <div class="legend-item">
                    <div class="color-swatch cheat"></div>
                    <span>Always Cheat</span>
                </div>
                <div class="legend-item">
                    <div class="color-swatch copycat"></div>
                    <span>Copycat (Tit-for-Tat)</span>
                </div>
                <div class="legend-item">
                    <div class="color-swatch grudger"></div>
                    <span>Grudger (Grim Trigger)</span>
                </div>
                <div class="legend-item">
                    <div class="color-swatch detective"></div>
                    <span>Detective</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Tooltip for nodes -->
    <div id="tooltip" class="glass-tooltip"></div>

    <script src="wasm_exec.js"></script>
    <script>
        // Initialize WebAssembly before running the main app
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then((result) => {
            go.run(result.instance);
            
            // Load the main app dynamically after Wasm is ready
            const appScript = document.createElement('script');
            appScript.src = "app.js";
            document.body.appendChild(appScript);
        }).catch(err => {
            console.error("Failed to load WebAssembly:", err);
            // Fallback for local development if wasm fails (load app anyway to use API)
            const appScript = document.createElement('script');
            appScript.src = "app.js";
            document.body.appendChild(appScript);
        });
    </script>
</body>
</html>
